name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ncurses5 deb from Debian (includes libtinfo5)
        run: |
          sudo apt update || true
          wget http://deb.debian.org/debian/pool/main/n/ncurses/libncurses5_6.3-2_amd64.deb -O libncurses5.deb
          sudo dpkg -i libncurses5.deb || sudo apt install -f -y
          wget http://deb.debian.org/debian/pool/main/n/ncurses/libtinfo5_6.3-2_amd64.deb -O libtinfo5.deb
          sudo dpkg -i libtinfo5.deb || sudo apt install -f -y
          rm *.deb

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: theos
          theos-src: https://github.com/theos/theos
          theos-sdks: https://github.com/xybp888/iOS-SDKs
          theos-sdks-branch: master
          orion: false

      - name: Build & Package
        run: |
          make clean || true
          make package FINALPACKAGE=1 || true
        env:
          THEOS_PACKAGE_SCHEME: rootless
          THEOS: ${{ github.workspace }}/theos
          ARCHS: arm64 arm64e

      - name: Upload artifacts (wide search)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: plugin-build
          path: |
            packages/*.deb
            .theos/obj/*.dylib
            **/*.dylib
            **/*.deb
          if-no-files-found: warn
