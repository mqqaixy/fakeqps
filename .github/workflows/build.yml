name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Manual install dependencies
        run: |
          sudo apt update || true
          sudo apt install -y fakeroot git perl build-essential unzip curl wget rsync libxml2-utils libncurses6 || true

      - name: Setup Theos (manual clone)
        run: |
          git clone --recursive https://github.com/theos/theos.git theos || true
          cd theos
          git checkout master || true
          cd ..
          mkdir -p theos/sdks
          git clone https://github.com/xybp888/iOS-SDKs.git temp-sdks || true
          mv temp-sdks/*.sdk theos/sdks/ || true
          rm -rf temp-sdks

      - name: Download Theos toolchain (clang/ld64 for Linux)
        run: |
          cd theos
          git clone https://github.com/theos/toolchain.git toolchain || true
          cd toolchain
          git checkout master || true
          cd ..
          ln -s toolchain/linux/iphone toolchain/iphone || true
          ls -la toolchain/linux/iphone/bin/ || true  # 打印 clang 是否下载成功

      - name: Cache Theos & SDKs
        uses: actions/cache@v4
        with:
          path: |
            theos
            .theos
          key: ${{ runner.os }}-theos-${{ hashFiles('Makefile', 'control', 'Tweak.x') }}

      - name: Build & Package
        run: |
          export THEOS=${{ github.workspace }}/theos
          export THEOS_PACKAGE_SCHEME=rootless
          export ARCHS="arm64 arm64e"
          make clean || true
          make package FINALPACKAGE=1 || true
          ls -la packages/ || true
          ls -la .theos/obj/ || true
          find . -name "*.dylib" || true
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload artifacts (always, wide search)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: plugin-build
          path: |
            **/*.deb
            **/*.dylib
            packages/
            .theos/obj/
          if-no-files-found: warn
