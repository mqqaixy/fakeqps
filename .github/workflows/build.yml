name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 必须使用 macos 才能完美支持 ldid 签名和 iOS SDK 编译
    runs-on: macos-latest

    steps:
      - name: 1. 下载仓库代码
        uses: actions/checkout@v4

      - name: 2. 自动化配置 Theos 环境
        uses: theos/setup-theos@v1
        with:
          sdk-version: '14.5'

      - name: 3. 编译并进行“巨魔兼容”签名
        run: |
          export THEOS=$HOME/theos
          
          # 寻找项目中的 Makefile 目录
          MAKE_PATH=$(find . -name "Makefile" -print -quit)
          cd "$(dirname "$MAKE_PATH")"
          
          # 1. 清理并开始正式打包
          make clean
          make package FINALPACKAGE=1
          
          # 2. 寻找生成的 dylib 文件进行暴力签名
          # 巨魔注入失败通常是因为权限定义不足，我们手动补齐
          DYLIB_FILE=$(find .theos/obj -name "*.dylib" -print -quit)
          
          if [ -f "$DYLIB_FILE" ]; then
            echo "正在为 $DYLIB_FILE 注入巨魔兼容签名..."
            
            # 创建万能权限配置文件
            cat > ents.plist <<EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>platform-application</key>
                <true/>
                <key>com.apple.private.security.no-container</key>
                <true/>
                <key>get-task-allow</key>
                <true/>
            </dict>
            </plist>
          EOF
            
            # 使用 theos 自带的 ldid 强制写入权限
            $THEOS/bin/ldid -Sents.plist "$DYLIB_FILE"
            echo "签名成功！"
          else
            echo "未找到 dylib 文件，请检查 Makefile 配置。"
          fi

      - name: 4. 导出成品文件
        uses: actions/upload-artifact@v4
        with:
          name: CarrierBundle-TrollStore-Ready
          path: |
            **/packages/*.deb
            **/.theos/obj/*.dylib
            ./*.dylib
          if-no-files-found: error
