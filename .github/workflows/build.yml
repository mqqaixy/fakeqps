name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (manual deb for libtinfo5 etc)
        run: |
          sudo apt update
          sudo apt install -y fakeroot git perl build-essential unzip curl wget rsync libxml2-utils libncurses6

          # 用 mirrors.ustc.edu.cn 镜像下载 libtinfo5 (当前有效)
          wget https://mirrors.ustc.edu.cn/ubuntu/pool/main/n/ncurses/libtinfo5_6.3-2_amd64.deb -O libtinfo5.deb || { echo "wget failed, try another mirror"; exit 1; }
          sudo dpkg -i libtinfo5.deb || sudo apt install -f -y

          # libncurses5
          wget https://mirrors.ustc.edu.cn/ubuntu/pool/main/n/ncurses/libncurses5_6.3-2_amd64.deb -O libncurses5.deb || exit 1
          sudo dpkg -i libncurses5.deb || sudo apt install -f -y

          # libncurses5-dev
          wget https://mirrors.ustc.edu.cn/ubuntu/pool/main/n/ncurses/libncurses5-dev_6.3-2_amd64.deb -O libncurses5-dev.deb || exit 1
          sudo dpkg -i libncurses5-dev.deb || sudo apt install -f -y

          # 清理 deb 文件
          rm *.deb

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: theos
          theos-src: https://github.com/theos/theos
          theos-sdks: https://github.com/xybp888/iOS-SDKs
          theos-sdks-branch: master
          orion: false

      - name: Cache Theos & SDKs
        uses: actions/cache@v4
        with:
          path: |
            theos
            .theos
          key: ${{ runner.os }}-theos-${{ hashFiles('Makefile', 'control', 'Tweak.x') }}

      - name: Build & Package
        run: |
          make clean
          make package FINALPACKAGE=1
        env:
          THEOS_PACKAGE_SCHEME: rootless
          THEOS: ${{ github.workspace }}/theos
          ARCHS: arm64 arm64e

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: |
            packages/*.deb
            .theos/obj/*.dylib
          if-no-files-found: warn
