name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (minimal, ignore wget failure)
        run: |
          sudo apt update || true
          sudo apt install -y fakeroot git perl build-essential unzip curl wget rsync libxml2-utils libncurses6 || true

          # 尝试下载 libtinfo5，如果失败跳过（Theos 支持 libtinfo6）
          wget https://mirrors.tuna.tsinghua.edu.cn/ubuntu/pool/main/n/ncurses/libtinfo5_6.3-2_amd64.deb -O libtinfo5.deb || true
          sudo dpkg -i libtinfo5.deb || sudo apt install -f -y || true

          # 清理
          rm *.deb || true

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: theos
          theos-src: https://github.com/theos/theos
          theos-sdks: https://github.com/xybp888/iOS-SDKs
          theos-sdks-branch: master
          orion: false

      - name: Cache Theos & SDKs
        uses: actions/cache@v4
        with:
          path: |
            theos
            .theos
          key: ${{ runner.os }}-theos-${{ hashFiles('Makefile', 'control', 'Tweak.x') }}

      - name: Build & Package
        run: |
          make clean
          make package FINALPACKAGE=1 || true   # 即使 make 报错也继续上传 artifacts
        env:
          THEOS_PACKAGE_SCHEME: rootless
          THEOS: ${{ github.workspace }}/theos
          ARCHS: arm64 arm64e

      - name: Upload artifacts (always try to upload)
        uses: actions/upload-artifact@v4
        if: always()   # 即使前一步失败也上传
        with:
          name: plugin-build
          path: |
            packages/*.deb
            .theos/obj/*.dylib
          if-no-files-found: warn
