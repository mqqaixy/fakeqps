name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: theos
          theos-src: https://github.com/theos/theos
          theos-sdks: https://github.com/xybp888/iOS-SDKs
          theos-sdks-branch: master
          orion: false

      - name: Build & Package
        run: |
          make clean || true
          make package FINALPACKAGE=1 || true
          # 强制打印输出目录，方便 debug
          ls -la packages/ || true
          ls -la .theos/obj/ || true
          find . -name "*.dylib" || true
        env:
          THEOS_PACKAGE_SCHEME: rootless
          THEOS: ${{ github.workspace }}/theos
          ARCHS: arm64 arm64e

      - name: Upload artifacts (wide search)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: plugin-build
          path: |
            packages/*.deb
            .theos/obj/*.dylib
            **/*.dylib
            **/*.deb
          if-no-files-found: warn
